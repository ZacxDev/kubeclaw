apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeclaw.fullname" . }}-devpod
  namespace: {{ include "kubeclaw.namespace" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kubeclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeclaw.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.channels.email.enabled }}
        checksum/email-plugin: {{ include (print $.Template.BasePath "/configmap-email-plugin.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.skills }}
        checksum/skills: {{ include (print $.Template.BasePath "/configmap-skills.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.workspaceFiles }}
        checksum/workspace: {{ include (print $.Template.BasePath "/configmap-workspace.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.workspaceContent }}
        checksum/workspace-content: {{ include (print $.Template.BasePath "/configmap-workspace-content.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "kubeclaw.fullname" . }}-devpod
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.snapshots.enabled .Values.snapshots.save.onShutdown }}
      terminationGracePeriodSeconds: {{ .Values.snapshots.save.terminationGracePeriodSeconds | default 300 }}
      {{- end }}
      hostname: {{ .Values.agentName | default (include "kubeclaw.fullname" .) | trunc 52 }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # --- SSH setup ---
              mkdir -p /root/.ssh
              if [ -f /etc/git-secret/ssh ]; then
                cp /etc/git-secret/ssh /root/.ssh/id_rsa
                chmod 600 /root/.ssh/id_rsa
                echo "Host github.com
                HostName github.com
                User git
                IdentityFile /root/.ssh/id_rsa
                StrictHostKeyChecking no" > /root/.ssh/config
                chmod 600 /root/.ssh/config
              fi

              # --- Repo clone/pull ---
              mkdir -p /data/workspace
              if [ -f /config/repos.json ]; then
                for repo in $(jq -r '.[] | @base64' /config/repos.json); do
                  _jq() { echo "$repo" | base64 -d | jq -r "$1"; }
                  REPO_URL=$(_jq '.url')
                  REPO_PATH=$(_jq '.path')
                  REPO_BRANCH=$(_jq '.branch // "main"')

                  if [ -d "$REPO_PATH/.git" ]; then
                    echo "Pulling $REPO_PATH..."
                    cd "$REPO_PATH" && git pull origin "$REPO_BRANCH" || true
                  else
                    echo "Cloning $REPO_URL to $REPO_PATH..."
                    rm -rf "$REPO_PATH"
                    git clone -b "$REPO_BRANCH" "$REPO_URL" "$REPO_PATH"
                  fi

                  cd "$REPO_PATH"
                  git config user.email "${GIT_EMAIL}"
                  git config user.name "${GIT_NAME}"
                done
              fi

              # --- Persist ~/.openclaw on the PVC so sessions, cron state,
              #     and credentials survive pod restarts ---
              mkdir -p /data/openclaw
              rm -rf /root/.openclaw
              ln -s /data/openclaw /root/.openclaw

              # --- Email plugin ---
              {{- if .Values.channels.email.enabled }}
              if [ -d /config/email-plugin ]; then
                PLUGIN_DIR="/usr/local/lib/node_modules/openclaw/extensions/email"
                mkdir -p "$PLUGIN_DIR"
                cp /config/email-plugin/index.js "$PLUGIN_DIR/"
                cp /config/email-plugin/package.json "$PLUGIN_DIR/"
                cp /config/email-plugin/openclaw.plugin.json "$PLUGIN_DIR/"
                echo "Email plugin installed"
              fi
              {{- end }}

              # --- Skills ---
              mkdir -p /root/.openclaw/skills /root/.openclaw/cron
              if [ -d /config/skills ]; then
                for f in /config/skills/*.md; do
                  [ -f "$f" ] || continue
                  skill_name=$(basename "$f" .md)
                  mkdir -p "/root/.openclaw/skills/${skill_name}"
                  cp "$f" "/root/.openclaw/skills/${skill_name}/SKILL.md"
                done
              fi

              # --- Workspace files ---
              if [ -f /config/workspace/files.json ]; then
                WORKSPACE="{{ include "kubeclaw.workspace" . }}"
                mkdir -p "$WORKSPACE"
                jq -c '.[]' /config/workspace/files.json | while read -r entry; do
                  fpath=$(echo "$entry" | jq -r '.path')
                  furl=$(echo "$entry" | jq -r '.url')
                  mkdir -p "$WORKSPACE/$(dirname "$fpath")"
                  curl -fsSL "$furl" -o "$WORKSPACE/$fpath"
                done
                echo "Workspace files installed: $(jq 'length' /config/workspace/files.json) files"
              fi

              # --- Workspace content (inline) ---
              if [ -d /config/workspace-content ]; then
                WORKSPACE="{{ include "kubeclaw.workspace" . }}"
                mkdir -p "$WORKSPACE"
                for f in /config/workspace-content/*; do
                  [ -f "$f" ] || continue
                  fname=$(basename "$f")
                  cp "$f" "$WORKSPACE/$fname"
                done
                echo "Workspace content files installed"
              fi

              # --- OAuth credentials ---
              mkdir -p /data/.claude
              if [ ! -f /data/.claude/.credentials.json ] && [ -f /secrets/claude-credentials.json ]; then
                cp /secrets/claude-credentials.json /data/.claude/.credentials.json
                chmod 600 /data/.claude/.credentials.json
              fi
              ln -sf /data/.claude /root/.claude

              {{- if .Values.infraTools.enabled }}
              # --- Infrastructure tools ---
              echo "Installing kubectl..."
              curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/$(dpkg --print-architecture)/kubectl" -o /usr/local/bin/kubectl
              chmod +x /usr/local/bin/kubectl

              echo "Installing flux..."
              curl -fsSL https://fluxcd.io/install.sh | bash

              echo "Installing sops..."
              curl -fsSL "https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.$(dpkg --print-architecture)" -o /usr/local/bin/sops
              chmod +x /usr/local/bin/sops

              echo "Installing age..."
              ARCH=$(dpkg --print-architecture)
              curl -fsSL "https://github.com/FiloSottile/age/releases/download/v1.1.1/age-v1.1.1-linux-${ARCH}.tar.gz" | tar xz -C /tmp
              mv /tmp/age/age /usr/local/bin/
              mv /tmp/age/age-keygen /usr/local/bin/
              rm -rf /tmp/age

              # Setup in-cluster kubeconfig
              mkdir -p /root/.kube
              if [ -f /var/run/secrets/kubernetes.io/serviceaccount/token ]; then
                echo "Setting up in-cluster kubeconfig..."
                kubectl config set-cluster in-cluster --server=https://kubernetes.default.svc --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                kubectl config set-credentials devpod --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                kubectl config set-context in-cluster --cluster=in-cluster --user=devpod --namespace={{ include "kubeclaw.namespace" . }}
                kubectl config use-context in-cluster
              fi

              # Copy remote kubeconfigs
              if [ -d /etc/kubeconfigs ]; then
                for kc in /etc/kubeconfigs/*; do
                  [ -f "$kc" ] || continue
                  cp "$kc" "/root/.kube/$(basename $kc)"
                  chmod 600 "/root/.kube/$(basename $kc)"
                done
              fi

              echo "Verifying infrastructure tools..."
              kubectl version --client 2>/dev/null || true
              flux --version 2>/dev/null || true
              sops --version 2>/dev/null || true
              {{- end }}

              {{- if .Values.snapshots.enabled }}
              # --- Snapshot tools (rclone) ---
              echo "Installing rclone..."
              curl -fsSL "https://downloads.rclone.org/rclone-current-linux-$(dpkg --print-architecture).deb" -o /tmp/rclone.deb
              dpkg -i /tmp/rclone.deb
              rm -f /tmp/rclone.deb

              {{- $providers := dict "s3" "AWS" "minio" "Minio" "r2" "Cloudflare" }}
              {{- $rcloneProvider := index $providers (.Values.snapshots.provider | default "s3") | default "AWS" }}
              {{- $snapshotPrefix := .Values.snapshots.prefix | default .Values.agentName }}
              {{- $snapshotBucket := .Values.snapshots.bucket }}
              {{- $snapshotRemote := printf "snapshot:%s/%s" $snapshotBucket $snapshotPrefix }}
              {{- if .Values.snapshots.encryption.enabled }}
              {{- $snapshotRemote = "encrypted:" }}
              {{- end }}

              # Generate rclone config
              mkdir -p /root/.config/rclone
              cat > /root/.config/rclone/rclone.conf << 'RCLONECONF'
              [snapshot]
              type = s3
              provider = {{ $rcloneProvider }}
              {{- if .Values.snapshots.endpoint }}
              endpoint = {{ .Values.snapshots.endpoint }}
              {{- end }}
              region = {{ .Values.snapshots.region | default "us-east-1" }}
              env_auth = true
              {{- if .Values.snapshots.encryption.enabled }}

              [encrypted]
              type = crypt
              remote = snapshot:{{ $snapshotBucket }}/{{ $snapshotPrefix }}
              password = ENCRYPTION_PASSWORD_PLACEHOLDER
              {{- end }}
              RCLONECONF

              {{- if .Values.snapshots.encryption.enabled }}
              OBSCURED_PASS=$(rclone obscure "$SNAPSHOT_ENCRYPTION_PASSWORD")
              sed -i "s|ENCRYPTION_PASSWORD_PLACEHOLDER|${OBSCURED_PASS}|" /root/.config/rclone/rclone.conf
              {{- end }}

              # Generate snapshot-save script
              cat > /usr/local/bin/snapshot-save << 'SAVESCRIPT'
              #!/bin/sh
              set -e
              BWLIMIT="${1:-0}"
              TIMESTAMP=$(date +%Y%m%dT%H%M%S)
              REMOTE="{{ $snapshotRemote }}"
              echo "[$(date -Iseconds)] Starting snapshot: $TIMESTAMP"
              {{- range .Values.snapshots.paths }}
              if [ -d "{{ . }}" ]; then
                echo "Syncing {{ . }}..."
                EXCLUDE_FROM_ARGS=""
                {{- if $.Values.snapshots.excludeFrom }}
                if [ -f "{{ $.Values.snapshots.excludeFrom }}" ]; then
                  EXCLUDE_FROM_ARGS="--exclude-from={{ $.Values.snapshots.excludeFrom }}"
                fi
                {{- else }}
                if [ -f "{{ . }}/.snapshotignore" ]; then
                  EXCLUDE_FROM_ARGS="--exclude-from={{ . }}/.snapshotignore"
                fi
                {{- end }}
                rclone sync "{{ . }}/" "${REMOTE}/${TIMESTAMP}/{{ base . }}/" \
                  {{- range $.Values.snapshots.exclude }}
                  --exclude="{{ . }}" \
                  {{- end }}
                  $EXCLUDE_FROM_ARGS \
                  --bwlimit="$BWLIMIT" --transfers=4 --checkers=4 --s3-no-check-bucket
              fi
              {{- end }}
              MAX_COUNT={{ .Values.snapshots.retention.maxCount | default 5 }}
              SNAPSHOTS=$(rclone lsjson "${REMOTE}/" --dirs-only 2>/dev/null | jq -r 'sort_by(.Name) | .[].Name' || true)
              COUNT=$(echo "$SNAPSHOTS" | grep -c . 2>/dev/null || echo "0")
              if [ "$COUNT" -gt "$MAX_COUNT" ]; then
                DELETE_COUNT=$((COUNT - MAX_COUNT))
                echo "[$(date -Iseconds)] Removing $DELETE_COUNT old snapshot(s)..."
                echo "$SNAPSHOTS" | head -n "$DELETE_COUNT" | while read -r snap; do
                  [ -n "$snap" ] && rclone purge "${REMOTE}/${snap}/" --s3-no-check-bucket && echo "Deleted: $snap"
                done
              fi
              echo "[$(date -Iseconds)] Snapshot complete: $TIMESTAMP"
              SAVESCRIPT
              chmod +x /usr/local/bin/snapshot-save

              {{- if .Values.snapshots.restore.onStartup }}
              # --- Snapshot restore ---
              SNAP_MARKER="/data/.snapshot-restored"
              if [ ! -f "$SNAP_MARKER" ]; then
                LATEST=$(rclone lsjson "{{ $snapshotRemote }}/" --dirs-only 2>/dev/null | jq -r 'sort_by(.Name) | last | .Name // empty' || true)
                if [ -n "$LATEST" ]; then
                  echo "[$(date -Iseconds)] Restoring workspace from snapshot: $LATEST"
                  {{- range .Values.snapshots.paths }}
                  mkdir -p "{{ . }}"
                  EXCLUDE_FROM_ARGS=""
                  {{- if $.Values.snapshots.excludeFrom }}
                  if [ -f "{{ $.Values.snapshots.excludeFrom }}" ]; then
                    EXCLUDE_FROM_ARGS="--exclude-from={{ $.Values.snapshots.excludeFrom }}"
                  fi
                  {{- end }}
                  rclone sync "{{ $snapshotRemote }}/${LATEST}/{{ base . }}/" "{{ . }}/" \
                    {{- range $.Values.snapshots.exclude }}
                    --exclude="{{ . }}" \
                    {{- end }}
                    $EXCLUDE_FROM_ARGS \
                    --transfers=4 --checkers=4 --s3-no-check-bucket
                  {{- end }}
                  echo "$LATEST" > "$SNAP_MARKER"
                  echo "[$(date -Iseconds)] Snapshot restored: $LATEST"
                else
                  echo "[$(date -Iseconds)] No snapshots found, starting fresh"
                fi
              else
                echo "[$(date -Iseconds)] Snapshot already restored ($(cat $SNAP_MARKER)), skipping"
              fi
              {{- end }}
              {{- end }}

              # --- Persist WhatsApp Baileys credentials across restarts ---
              {{- if .Values.channels.whatsapp.enabled }}
              mkdir -p /data/whatsapp-creds /root/.openclaw/credentials
              ln -sfn /data/whatsapp-creds /root/.openclaw/credentials/whatsapp
              {{- end }}

              # --- Generate openclaw.json with secrets injected ---
              # Gateway v2026.3+ requires hooks.token != gateway.auth.token.
              # Derive a distinct gateway token from HOOKS_TOKEN.
              GATEWAY_TOKEN=$(echo -n "gw-${HOOKS_TOKEN}" | sha256sum | cut -d' ' -f1)
              cat /config/openclaw.json | jq \
                --arg matrix_token "$MATRIX_ACCESS_TOKEN" \
                --arg telegram_token "$TELEGRAM_BOT_TOKEN" \
                --arg hooks_token "$HOOKS_TOKEN" \
                --arg gateway_token "$GATEWAY_TOKEN" \
                {{- if .Values.channels.sms.enabled }}
                --arg twilio_sid "$TWILIO_ACCOUNT_SID" \
                --arg twilio_token "$TWILIO_AUTH_TOKEN" \
                --arg twilio_phone "$TWILIO_PHONE_NUMBER" \
                {{- end }}
                '.channels.matrix.accessToken = $matrix_token |
                 .channels.telegram.botToken = $telegram_token |
                 {{- if .Values.channels.sms.enabled }}
                 .channels.sms.accountSid = $twilio_sid |
                 .channels.sms.authToken = $twilio_token |
                 .channels.sms.phoneNumber = $twilio_phone |
                 {{- end }}
                 .hooks.token = $hooks_token |
                 .gateway.auth.token = $gateway_token' \
                > /root/.openclaw/openclaw.json
              chmod 600 /root/.openclaw/openclaw.json

              # --- Pre-approve Telegram users ---
              {{- if and .Values.channels.telegram.enabled .Values.channels.telegram.allowFrom }}
              mkdir -p /root/.openclaw/credentials
              printf '%s\n' '{{ dict "version" 1 "allowFrom" .Values.channels.telegram.allowFrom | toJson }}' > /root/.openclaw/credentials/telegram-allowFrom.json
              chmod 600 /root/.openclaw/credentials/telegram-allowFrom.json
              echo "[$(date -Iseconds)] Pre-approved Telegram users: {{ .Values.channels.telegram.allowFrom | toJson }}"
              {{- end }}

              # --- Initialize channels ---
              echo "[$(date -Iseconds)] Running openclaw doctor --fix..."
              openclaw doctor --fix || echo "Doctor exited with $?, continuing..."

              # --- Strip channels not explicitly enabled in helm values ---
              # openclaw doctor may auto-enable channels (e.g. sms) that the
              # gateway version doesn't support. Remove any not in the configmap.
              {{- $enabledChannels := list }}
              {{- if .Values.channels.matrix.enabled }}{{ $enabledChannels = append $enabledChannels "matrix" }}{{ end }}
              {{- if .Values.channels.telegram.enabled }}{{ $enabledChannels = append $enabledChannels "telegram" }}{{ end }}
              {{- if .Values.channels.whatsapp.enabled }}{{ $enabledChannels = append $enabledChannels "whatsapp" }}{{ end }}
              {{- if .Values.channels.email.enabled }}{{ $enabledChannels = append $enabledChannels "email" }}{{ end }}
              {{- if .Values.channels.sms.enabled }}{{ $enabledChannels = append $enabledChannels "sms" }}{{ end }}
              ALLOWED_CHANNELS='{{ join "," $enabledChannels }}'
              if [ -f /root/.openclaw/openclaw.json ]; then
                jq --arg allowed "$ALLOWED_CHANNELS" '
                  ($allowed | split(",")) as $keep |
                  .channels |= with_entries(select(.key | IN($keep[])))
                ' /root/.openclaw/openclaw.json > /tmp/oc-clean.json \
                  && mv /tmp/oc-clean.json /root/.openclaw/openclaw.json \
                  && echo "[$(date -Iseconds)] Stripped unauthorized channels from openclaw.json"
              fi

              # --- Bootstrap agent auth from Claude credentials ---
              AGENT_ID="{{ include "kubeclaw.agentId" . }}"
              AGENT_AUTH_DIR="/root/.openclaw/agents/$AGENT_ID/agent"
              CREDS_FILE="/root/.claude/.credentials.json"
              if [ -f "$CREDS_FILE" ]; then
                OAUTH_TOKEN=$(jq -r '.claudeAiOauth.accessToken // empty' "$CREDS_FILE" 2>/dev/null)
                if [ -n "$OAUTH_TOKEN" ]; then
                  REFRESH_TOKEN=$(jq -r '.claudeAiOauth.refreshToken // empty' "$CREDS_FILE" 2>/dev/null)
                  EXPIRES_AT=$(jq -r '.claudeAiOauth.expiresAt // 0' "$CREDS_FILE" 2>/dev/null)
                  mkdir -p "$AGENT_AUTH_DIR"
                  jq -n \
                    --arg access "$OAUTH_TOKEN" \
                    --arg refresh "$REFRESH_TOKEN" \
                    --argjson expires "$EXPIRES_AT" \
                    '{"version":1,"profiles":{"anthropic:claude-cli":{"type":"oauth","provider":"anthropic","access":$access,"refresh":$refresh,"expires":$expires}}}' \
                    > "$AGENT_AUTH_DIR/auth-profiles.json"
                  chmod 600 "$AGENT_AUTH_DIR/auth-profiles.json"
                  echo "[$(date -Iseconds)] Created auth-profiles for agent '$AGENT_ID' from Claude credentials"
                  mkdir -p /root/.openclaw/agents/main/agent
                  cp "$AGENT_AUTH_DIR/auth-profiles.json" /root/.openclaw/agents/main/agent/auth-profiles.json
                fi
              fi

              {{- if .Values.extraInitCommands }}
              # --- Extra init commands ---
              {{ .Values.extraInitCommands | nindent 14 }}
              {{- end }}

              # --- Workspace sync (2-way, background) ---
              # Syncs /data/workspace ↔ portal S3 via the workspace API.
              #
              # On startup: pulls files from S3 that aren't on disk yet.
              # Every 15s: uploads changed files (find -newer), skips binary.
              # Every ~2.5min: reconciles deletions (local deletes → S3 deletes).
              #
              # X-Sync-Source: workspace-sync header prevents the portal from
              # writing files back to the pod (which would cause an mtime loop).
              if [ -n "$PORTAL_URL" ] && [ -n "$HOOKS_TOKEN" ]; then
                # --- Initial pull: restore workspace from S3 ---
                WORKSPACE="{{ include "kubeclaw.workspace" . }}"
                _ws_filelist=$(curl -sf \
                  -H "Authorization: Bearer $HOOKS_TOKEN" \
                  "$PORTAL_URL/api/internal/workspace" 2>/dev/null || true)
                if [ -n "$_ws_filelist" ] && echo "$_ws_filelist" | jq -e '.files' >/dev/null 2>&1; then
                  echo "$_ws_filelist" | jq -c '.files[]' | while read -r _entry; do
                    _fpath=$(echo "$_entry" | jq -r '.filename')
                    _fid=$(echo "$_entry" | jq -r '.id')
                    if [ ! -f "$WORKSPACE/$_fpath" ]; then
                      mkdir -p "$WORKSPACE/$(dirname "$_fpath")"
                      curl -sf \
                        -H "Authorization: Bearer $HOOKS_TOKEN" \
                        "$PORTAL_URL/api/internal/workspace/$_fid" \
                        -o "$WORKSPACE/$_fpath" 2>/dev/null \
                        && echo "[$(date -Iseconds)] workspace-sync: restored $_fpath" \
                        || echo "[$(date -Iseconds)] workspace-sync: failed to restore $_fpath" >&2
                    fi
                  done
                fi

                # --- Background sync loop ---
                (
                  MARKER="/tmp/.workspace-sync-marker"
                  touch "$MARKER"
                  sleep 30  # initial delay — let gateway start first
                  CYCLE=0
                  while true; do
                    sleep 15
                    CYCLE=$((CYCLE + 1))

                    # --- Upload: find files modified since last sync ---
                    changed=$(find "$WORKSPACE" -newer "$MARKER" -type f ! -path '*/\.*' 2>/dev/null)
                    if [ -n "$changed" ]; then
                      echo "$changed" | while IFS= read -r filepath; do
                        relpath="${filepath#$WORKSPACE/}"
                        # Skip binary files — only sync text content
                        mimetype=$(file -b --mime-type "$filepath" 2>/dev/null)
                        case "$mimetype" in
                          text/*|application/json|application/xml|application/javascript|application/x-yaml|application/toml) ;;
                          *) continue ;;
                        esac
                        content=$(cat "$filepath" 2>/dev/null) || continue
                        payload=$(jq -n --arg path "$relpath" --arg content "$content" '{path: $path, content: $content}')
                        curl -sf -X POST \
                          -H "Authorization: Bearer $HOOKS_TOKEN" \
                          -H "Content-Type: application/json" \
                          -H "X-Sync-Source: workspace-sync" \
                          -d "$payload" \
                          "$PORTAL_URL/api/internal/workspace" >/dev/null 2>&1 \
                          && echo "[$(date -Iseconds)] workspace-sync: synced $relpath" \
                          || echo "[$(date -Iseconds)] workspace-sync: failed $relpath" >&2
                      done
                      touch "$MARKER"
                    fi

                    # --- Delete reconciliation: every 10 cycles (~2.5 min) ---
                    # Skip files updated in the last 5 minutes to avoid racing with
                    # browser uploads that are still being synced to the pod via k8s exec.
                    if [ $((CYCLE % 10)) -eq 0 ]; then
                      remote_list=$(curl -sf \
                        -H "Authorization: Bearer $HOOKS_TOKEN" \
                        "$PORTAL_URL/api/internal/workspace" 2>/dev/null || true)
                      if [ -n "$remote_list" ] && echo "$remote_list" | jq -e '.files' >/dev/null 2>&1; then
                        now_epoch=$(date +%s)
                        echo "$remote_list" | jq -c '.files[]' | while IFS= read -r _fentry; do
                          rfile=$(echo "$_fentry" | jq -r '.filename')
                          [ -z "$rfile" ] && continue
                          if [ ! -f "$WORKSPACE/$rfile" ]; then
                            # Grace period: don't delete files updated < 5 min ago
                            # (may still be in transit from a browser upload via k8s exec)
                            updated_at=$(echo "$_fentry" | jq -r '.updated_at // empty')
                            if [ -n "$updated_at" ]; then
                              file_epoch=$(date -d "$updated_at" +%s 2>/dev/null || echo 0)
                              age=$((now_epoch - file_epoch))
                              if [ "$age" -lt 300 ]; then
                                continue
                              fi
                            fi
                            curl -sf -X DELETE \
                              -H "Authorization: Bearer $HOOKS_TOKEN" \
                              -H "X-Sync-Source: workspace-sync" \
                              "$PORTAL_URL/api/internal/workspace/by-path?path=$(printf '%s' "$rfile" | jq -sRr @uri)" >/dev/null 2>&1 \
                              && echo "[$(date -Iseconds)] workspace-sync: deleted $rfile" \
                              || echo "[$(date -Iseconds)] workspace-sync: delete failed $rfile" >&2
                          fi
                        done
                      fi
                    fi
                  done
                ) &
                echo "[$(date -Iseconds)] Workspace sync started (2-way, background)"
              fi

              # --- Skills API endpoint (port 18790) ---
              # Reads skills from SKILL.md frontmatter, serves JSON.
              # Written to file to avoid YAML parsing issues with inline Python.
              base64 -d > /tmp/skills-api.py << 'B64'
              {{- $script := `
import http.server, json, os, re, urllib.request, urllib.error, ssl
SKILLS_DIR = "/root/.openclaw/skills"
CONFIG_PATH = "/root/.openclaw/openclaw.json"
_ctx = ssl.create_default_context()
_ctx.check_hostname = False
_ctx.verify_mode = ssl.CERT_NONE
UA = "SkillsAPI/1.0"
def read_config():
    try:
        with open(CONFIG_PATH) as f:
            cfg = json.load(f)
        return cfg.get("channels",{}).get("matrix",{}).get("homeserver",""), cfg.get("channels",{}).get("matrix",{}).get("accessToken","")
    except Exception:
        return "", ""
def parse_skill(d, content):
    fm = re.match(r"^---\n(.*?)\n---", content, re.DOTALL)
    if fm:
        meta = {}
        for line in fm.group(1).splitlines():
            kv = line.split(":", 1)
            if len(kv) == 2:
                meta[kv[0].strip()] = kv[1].strip()
        return {"id": d, "name": meta.get("name", d), "description": meta.get("description", ""), "trigger": "/" + d, "userInvocable": meta.get("user-invocable", "false").lower() == "true"}
    title = d
    tm = re.search(r"^#\s+(.+)", content, re.MULTILINE)
    if tm:
        title = tm.group(1).strip()
    caps = []
    cm = re.search(r"##\s+.*(?:Capabilit|Skill|Command|Feature).*\n((?:\s*(?:\d+\.|-|\*)\s+.+\n?)+)", content, re.IGNORECASE)
    if cm:
        for line in cm.group(1).strip().splitlines():
            item = re.sub(r"^\s*(?:\d+\.|-|\*)\s+\*{0,2}", "", line).strip()
            short = item.split(" - ")[0].split(" -- ")[0].strip().rstrip("*")
            if short:
                caps.append(short)
    desc = ", ".join(caps[:6]) if caps else title
