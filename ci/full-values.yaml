agentName: fullbot
agentDisplayName: "Full Test Bot"

image:
  repository: your-registry/openclaw
  tag: v1.2.3
  pullPolicy: IfNotPresent

git:
  email: "test@example.com"
  name: "Test Agent"
  repos:
    - url: "git@github.com:test/repo1.git"
      path: "/data/repos/repo1"
      branch: "main"
    - url: "git@github.com:test/repo2.git"
      path: "/data/repos/repo2"
      branch: "develop"

agent:
  id: "custom-agent-id"
  workspace: "/data/custom-workspace"
  maxConcurrent: 8
  model:
    primary: "anthropic/claude-opus-4-5"
  mentionPatterns:
    - "@fullbot"
    - "hey fullbot"

skills:
  fullbot.md: |
    # Full Bot Skill
    You are the full test bot.
  helper.md: |
    # Helper Skill
    Additional instructions.

workspaceContent:
  AGENTS.md: |
    # Project Instructions
    Always use feature branches for changes.
  CLAUDE.md: |
    # Claude Code Instructions
    Follow the project conventions.

channels:
  matrix:
    enabled: true
    homeserver: "https://matrix.example.com"
    dm:
      policy: "open"
      allowFrom: ["*"]
    groupPolicy: "open"
    autoJoin: "always"
  telegram:
    enabled: true

tools:
  web:
    search:
      enabled: true
      provider: "brave"
      maxResults: 5

gateway:
  mode: "local"
  callbackUrl: "http://gateway.example.com:18789"
  http:
    endpoints:
      chatCompletions:
        enabled: true

hooks:
  enabled: true
  mappings:
    - match: { path: "custom" }
      action: "agent"
      wakeMode: "now"
      name: "Custom Hook"

existingSecret: devpod-secrets

namespace:
  create: true

rbac:
  create: true
  clusterAdmin:
    enabled: true
  orchestrator:
    enabled: false

infraTools:
  enabled: true
  kubeconfigs:
    existingSecret: kubeconfigs

extraConfigMaps:
  - name: agents-registry
    mountPath: /config/agents
    data:
      agents.json: |
        {"agents": []}

extraEnv:
  - name: CUSTOM_VAR
    value: "custom-value"

snapshots:
  enabled: true
  provider: minio
  bucket: workspace-snapshots
  endpoint: "http://minio.minio-tenant.svc.cluster.local"
  region: "us-east-1"
  paths:
    - /data/workspace
  exclude:
    - ".git/objects/**"
    - "node_modules/**"
  save:
    schedule: "0 */6 * * *"
    onShutdown: true
    terminationGracePeriodSeconds: 300
  restore:
    onStartup: true
  retention:
    maxCount: 5
  encryption:
    enabled: true
  bandwidth:
    limit: "10M"
  credentials:
    existingSecret: snapshot-creds

persistence:
  enabled: true
  storageClass: "fast-ssd"
  size: 50Gi
  accessModes:
    - ReadWriteOnce

resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "4Gi"
    cpu: "4000m"
