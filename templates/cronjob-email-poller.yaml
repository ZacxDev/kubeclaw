{{- if .Values.channels.email.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeclaw.fullname" . }}-email-poller
  namespace: {{ include "kubeclaw.namespace" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
data:
  poll-emails.sh: |
    #!/bin/sh
    set -e

    MAILPIT_URL="{{ .Values.channels.email.mailpitUrl }}"
    AGENT_EMAIL="{{ .Values.channels.email.address }}"
    {{- if .Values.channels.email.portalUrl }}
    AGENT_URL="{{ .Values.channels.email.portalUrl }}/api/internal/email-ingest"
    {{- else }}
    AGENT_URL="http://{{ include "kubeclaw.fullname" . }}-devpod.{{ include "kubeclaw.namespace" . }}.svc.cluster.local:18789/hooks/email"
    {{- end }}

    echo "Checking for new emails to ${AGENT_EMAIL}..."

    # Search for unread messages addressed to this agent
    MESSAGES=$(curl -sf "${MAILPIT_URL}/api/v1/search?query=to:${AGENT_EMAIL}&limit=50" | jq -r '.messages[]? | select(.Read == false) | .ID')

    if [ -z "$MESSAGES" ]; then
      echo "No new emails found"
      exit 0
    fi

    for MSG_ID in $MESSAGES; do
      echo "Processing message: $MSG_ID"

      # Get message details
      MSG=$(curl -sf "${MAILPIT_URL}/api/v1/message/${MSG_ID}")

      FROM=$(echo "$MSG" | jq -r '.From.Address // .From.Name // "unknown"')

      # Skip bounce/DSN messages (MAILER-DAEMON, postmaster, empty sender)
      case "$FROM" in
        MAILER-DAEMON*|mailer-daemon*|postmaster*|""|unknown)
          echo "Skipping bounce/DSN from: $FROM"
          curl -sf -X PUT "${MAILPIT_URL}/api/v1/messages" \
            -H "Content-Type: application/json" \
            -d "{\"ids\":[\"${MSG_ID}\"],\"read\":true}" > /dev/null
          continue
          ;;
      esac

      SUBJECT=$(echo "$MSG" | jq -r '.Subject // "No subject"')
      BODY=$(echo "$MSG" | jq -r '.Text // .HTML // "No body"' | head -c 2000)
      MESSAGE_ID=$(echo "$MSG" | jq -r '.MessageID // ""')

      # Fetch RFC 2822 headers for threading (In-Reply-To, References)
      HEADERS=$(curl -sf "${MAILPIT_URL}/api/v1/message/${MSG_ID}/headers" || echo "{}")
      IN_REPLY_TO=$(echo "$HEADERS" | jq -r '.["In-Reply-To"]?[0] // ""')
      REFERENCES=$(echo "$HEADERS" | jq -r '.References?[0] // ""')

      echo "From: $FROM"
      echo "Subject: $SUBJECT"

      # Fetch attachments (base64-encoded, up to 10MB each)
      ATTACHMENTS="[]"
      ATT_COUNT=$(echo "$MSG" | jq -r '.Attachments | length')
      if [ "$ATT_COUNT" -gt 0 ] 2>/dev/null; then
        for i in $(seq 0 $((ATT_COUNT - 1))); do
          PART_ID=$(echo "$MSG" | jq -r ".Attachments[$i].PartID")
          FILENAME=$(echo "$MSG" | jq -r ".Attachments[$i].FileName")
          CONTENT_TYPE=$(echo "$MSG" | jq -r ".Attachments[$i].ContentType")
          SIZE=$(echo "$MSG" | jq -r ".Attachments[$i].Size")

          # Skip attachments larger than 10MB
          if [ "$SIZE" -gt 10485760 ] 2>/dev/null; then
            echo "Skipping large attachment: $FILENAME ($SIZE bytes)"
            continue
          fi

          echo "Fetching attachment: $FILENAME ($CONTENT_TYPE, $SIZE bytes)"
          ATT_DATA=$(curl -sf "${MAILPIT_URL}/api/v1/message/${MSG_ID}/part/${PART_ID}" | base64 -w0)

          # Extract text from PDFs so the agent can read the content
          EXTRACTED=""
          if [ "$CONTENT_TYPE" = "application/pdf" ] && [ -n "$ATT_DATA" ]; then
            echo "$ATT_DATA" | base64 -d > /tmp/att.pdf 2>/dev/null
            EXTRACTED=$(pdftotext /tmp/att.pdf - 2>/dev/null || echo "")
            rm -f /tmp/att.pdf
            if [ -n "$EXTRACTED" ]; then
              echo "Extracted $(echo "$EXTRACTED" | wc -c) bytes of text from PDF"
            fi
          fi

          if [ -n "$ATT_DATA" ]; then
            ATTACHMENTS=$(echo "$ATTACHMENTS" | jq \
              --arg fn "$FILENAME" \
              --arg ct "$CONTENT_TYPE" \
              --arg d "$ATT_DATA" \
              --arg et "$EXTRACTED" \
              '. + [{"filename": $fn, "content_type": $ct, "data": $d, "extracted_text": $et}]')
          fi
        done
      fi

      # Send to agent hooks endpoint
      PAYLOAD=$(jq -n \
        --arg from "$FROM" \
        --arg subject "$SUBJECT" \
        --arg body "$BODY" \
        --arg message_id "$MESSAGE_ID" \
        --arg in_reply_to "$IN_REPLY_TO" \
        --arg references "$REFERENCES" \
        --argjson attachments "$ATTACHMENTS" \
        '{from: $from, subject: $subject, body: $body, message_id: $message_id, in_reply_to: $in_reply_to, references: $references, attachments: $attachments}')

      HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
        -X POST "${AGENT_URL}" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${HOOKS_TOKEN}" \
        -d "$PAYLOAD" || echo "000")

      if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
        echo "Successfully forwarded to agent"
        # Mark as read
        curl -sf -X PUT "${MAILPIT_URL}/api/v1/messages" \
          -H "Content-Type: application/json" \
          -d "{\"ids\":[\"${MSG_ID}\"],\"read\":true}" > /dev/null
      else
        echo "Failed to forward to agent (HTTP $HTTP_CODE)"
      fi

      echo "---"
    done

    echo "Done processing emails"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kubeclaw.fullname" . }}-email-poller
  namespace: {{ include "kubeclaw.namespace" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: poller
              image: alpine:latest
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache curl jq poppler-utils && /scripts/poll-emails.sh
              env:
                - name: HOOKS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "kubeclaw.secretName" . }}
                      key: HOOKS_TOKEN
                      optional: true
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "25m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
          volumes:
            - name: scripts
              configMap:
                name: {{ include "kubeclaw.fullname" . }}-email-poller
                defaultMode: 0755
{{- end }}
