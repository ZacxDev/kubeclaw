def list_skills():
    skills = []
    if not os.path.isdir(SKILLS_DIR):
        return skills
    for d in sorted(os.listdir(SKILLS_DIR)):
        p = os.path.join(SKILLS_DIR, d, "SKILL.md")
        if not os.path.isfile(p):
            continue
        with open(p) as f:
            c = f.read()
        skills.append(parse_skill(d, c))
    return skills
def publish_skills(room_id):
    hs, token = read_config()
    if not hs or not token:
        return 500, "no config"
    skills = [s for s in list_skills() if s.get("userInvocable")] or list_skills()
    encoded = urllib.request.quote(room_id, safe="")
    req = urllib.request.Request(hs + "/_matrix/client/v3/rooms/" + encoded + "/state/dev.clankselect.agent_skills/", json.dumps({"skills": skills}).encode(), method="PUT", headers={"Content-Type": "application/json", "Authorization": "Bearer " + token, "User-Agent": UA})
